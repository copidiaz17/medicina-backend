# ── Cardio — Configuración de Nginx para producción ───────────────
#
# Instrucciones de instalación:
#   1. Copiá este archivo a /etc/nginx/sites-available/cardio
#   2. Creá el symlink: ln -s /etc/nginx/sites-available/cardio /etc/nginx/sites-enabled/cardio
#   3. Reemplazá "tudominio.com" por tu dominio real
#   4. Instalá certbot y generá SSL: certbot --nginx -d tudominio.com
#   5. Verificá la config: nginx -t
#   6. Recargá nginx: systemctl reload nginx

upstream cardio_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tudominio.com;

    # ── SSL (certbot completa estas rutas automáticamente) ─────────
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Headers de seguridad ───────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                always;
    add_header X-Content-Type-Options    "nosniff"                   always;
    add_header X-XSS-Protection          "1; mode=block"             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Límite de tamaño para uploads (debe coincidir con multer) ──
    client_max_body_size 32M;

    # ── Gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── API Backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://cardio_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # ── Frontend SPA ───────────────────────────────────────────────
    root /var/www/cardio/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets hasheados (Vite genera nombres con hash)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cachear el index.html (siempre sirve el último build)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Logs ───────────────────────────────────────────────────────
    access_log /var/log/nginx/cardio.access.log;
    error_log  /var/log/nginx/cardio.error.log warn;
}
